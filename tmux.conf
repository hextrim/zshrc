# Terminal settings
set-option -g default-terminal "screen-256color"
set -g mouse on

## Clipboard integration (using system clipboard for WSL)
# Copy to clipboard with Ctrl+c
bind C-c run "tmux save-buffer - | clip.exe"

# Paste from clipboard with Ctrl+v
bind C-v run "tmux set-buffer \"$(powershell.exe -command 'Get-Clipboard' | tr -d '\r')\"; tmux paste-buffer"

# Mouse selection automatically copies to clipboard
unbind -n -Tcopy-mode-vi MouseDragEnd1Pane
bind -Tcopy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel\; run "tmux save-buffer - | clip.exe"

# Middle click to paste from clipboard
unbind-key MouseDown2Pane
bind-key -n MouseDown2Pane run "tmux set-buffer \"$(powershell.exe -command 'Get-Clipboard' | tr -d '\r')\"; tmux paste-buffer"

# Drag to re-order windows
bind-key -n MouseDrag1Status swap-window -t=

# Double click on window list to open new window
bind-key -n DoubleClick1Status new-window

# Better window/pane navigation
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Status bar
set -g status-position bottom
set -g status-style 'bg=colour234 fg=colour137'
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-style 'fg=colour81 bg=colour238 bold'
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-style 'fg=colour138 bg=colour235 none'
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '
